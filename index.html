<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO - IA v2.0</title>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; --red: #ff3e3e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 100px; }
        
        /* Navegação */
        .nav { position: fixed; bottom: 0; width: 100%; height: 70px; background: #111; display: flex; border-top: 1px solid #222; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.7rem; color: #666; cursor: pointer; }
        .nav-item.active { color: var(--neon); }

        .container { padding: 20px; max-width: 500px; margin: auto; display: none; }
        .container.active { display: block; }

        /* Aba Início - Saldos */
        .balance-card { background: var(--card); border-radius: 20px; padding: 25px; margin-bottom: 15px; border-left: 5px solid var(--neon); }
        .balance-label { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .balance-value { font-size: 2rem; font-weight: bold; margin-bottom: 15px; }
        .invested-card { background: var(--card); border-radius: 20px; padding: 20px; border-left: 5px solid var(--blue); }

        /* Scanner */
        .scanner-btn { background: #121212; border: 2px dashed #333; border-radius: 20px; padding: 40px 20px; text-align: center; cursor: pointer; }
        #loading { display: none; color: var(--blue); font-weight: bold; margin-top: 15px; }

        /* Histórico */
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-top: 15px; border: 1px solid #222; }
        .btn-clear { background: #ff3e3e22; color: #ff3e3e; border: none; padding: 12px; width: 100%; border-radius: 10px; margin-top: 20px; }
    </style>
</head>
<body>

<div id="aba-inicio" class="container active">
    <h2 style="color: var(--neon); font-size: 1rem;">RESUMO GERAL</h2>
    <div class="balance-card">
        <div class="balance-label">Saldo Total (Lucro)</div>
        <div class="balance-value" style="color: var(--neon);">R$ <span id="saldo-total">0,00</span></div>
    </div>
    <div class="invested-card">
        <div class="balance-label">Saldo Investido</div>
        <div class="balance-value" style="color: var(--blue); font-size: 1.5rem;">R$ <span id="saldo-investido">0,00</span></div>
    </div>
</div>

<div id="aba-scanner" class="container">
    <h2 style="color: var(--blue); font-size: 1rem;">SCANNER IA</h2>
    <div class="scanner-btn" onclick="document.getElementById('file-input').click()">
        <span style="font-size: 2.5rem;">📸</span><br>
        <b>ESCANEAR INVESTIMENTOS</b><br>
        <small style="color: #555;">Capture apenas blocos completos</small>
        <input type="file" id="file-input" accept="image/*" hidden onchange="processarIA(this)">
        <div id="loading">🤖 IA PROCESSANDO...</div>
    </div>

    <div id="resultado-lista"></div>
    <button class="btn-clear" onclick="limparDados()">LIMPAR TUDO</button>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="mudarAba('inicio', this)">🏠<br>Início</div>
    <div class="nav-item" onclick="mudarAba('scanner', this)">📊<br>Investir</div>
</nav>

<script>
    let worker = null;
    async function initIA() {
        worker = await Tesseract.createWorker();
        await worker.loadLanguage('eng+por');
        await worker.initialize('eng+por');
        await worker.setParameters({ tessedit_char_whitelist: '0123456789BRL.,/ dias' });
    }
    initIA();

    function mudarAba(aba, el) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('aba-' + aba).classList.add('active');
        el.classList.add('active');
    }

    async function processarIA(input) {
        if (!input.files || !input.files[0]) return;
        document.getElementById('loading').style.display = 'block';

        try {
            const { data: { text } } = await worker.recognize(input.files[0]);
            const cleanText = text.replace(/\s+/g, ' ');

            const regexValores = /BRL\s?(\d+[\.,]\d{2})/gi;
            const regexDatas = /(\d{2}\/\d{2}\/\d{4})/g;
            const regexDias = /(\d+)\s?dias/gi;

            const valores = [...cleanText.matchAll(regexValores)].map(m => parseFloat(m[1].replace(',', '.')));
            const datas = [...cleanText.matchAll(regexDatas)].map(m => m[1]);
            const prazos = [...cleanText.matchAll(regexDias)].map(m => parseInt(m[1]));

            let novosItens = [];
            for (let i = 0; i < valores.length; i += 2) {
                let inv = valores[i];
                let ret = valores[i+1];
                let dataIni = datas[Math.floor(i/2)];
                let prazo = prazos[Math.floor(i/2)];

                if (inv && ret && dataIni && prazo) {
                    // Lógica solicitada: Se investe 100 e volta 1000, o lucro (Saldo Total) é 900
                    let lucroReal = ret - inv; 
                    
                    let partes = dataIni.split('/');
                    let dataObj = new Date(partes[2], partes[1] - 1, partes[0]);
                    dataObj.setDate(dataObj.getDate() + prazo);

                    novosItens.push({
                        id: Date.now() + i,
                        investido: inv,
                        lucro: lucroReal,
                        dataFim: dataObj.toLocaleDateString('pt-BR'),
                        prazo: prazo
                    });
                }
            }
            if (novosItens.length > 0) salvar(novosItens);
        } catch (e) { alert("Erro na leitura."); }
        finally { document.getElementById('loading').style.display = 'none'; input.value = ""; }
    }

    function salvar(itens) {
        const antigo = JSON.parse(localStorage.getItem('fin_db_v5') || '[]');
        localStorage.setItem('fin_db_v5', JSON.stringify([...itens, ...antigo]));
        atualizarTudo();
    }

    function limparDados() { if(confirm("Apagar tudo?")) { localStorage.removeItem('fin_db_v5'); atualizarTudo(); } }

    function atualizarTudo() {
        const dados = JSON.parse(localStorage.getItem('fin_db_v5') || '[]');
        let totalLucro = 0;
        let totalInvestido = 0;

        const lista = document.getElementById('resultado-lista');
        lista.innerHTML = "";

        dados.forEach(item => {
            totalLucro += item.lucro;
            totalInvestido += item.investido;

            lista.innerHTML += `
                <div class="card">
                    <div style="font-size:0.7rem; color:#666;">RETORNO EM: ${item.dataFim} (${item.prazo} DIAS)</div>
                    <div style="display:flex; justify-content:space-between; margin-top:5px;">
                        <span>Investido: <b>R$ ${item.investido.toFixed(2)}</b></span>
                        <span style="color:var(--neon)">Lucro: <b>+ R$ ${item.lucro.toFixed(2)}</b></span>
                    </div>
                </div>`;
        });

        document.getElementById('saldo-total').innerText = totalLucro.toLocaleString('pt-BR', {minimumFractionDigits: 2});
        document.getElementById('saldo-investido').innerText = totalInvestido.toLocaleString('pt-BR', {minimumFractionDigits: 2});
    }

    window.onload = atualizarTudo;
</script>
</body>
</html>
