<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance PRO + Gemini AI</title>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --blue: #00d4ff; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #121212; border: 1px solid #222; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .scanner-btn { background: var(--blue); color: #000; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; font-weight: bold; }
        .hist-item { border-left: 4px solid var(--neon); background: #1a1a1a; padding: 15px; margin-top: 10px; border-radius: 10px; }
        input { width: 100%; padding: 10px; margin-top: 10px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Configuração</h3>
        <label style="font-size: 0.8rem; color: #888;">COLE SUA API KEY AQUI:</label>
        <input type="password" id="api-key" placeholder="AIza...">
        <p style="font-size: 0.7rem; color: #555;">Sua chave fica salva apenas no seu navegador.</p>
    </div>

    <div class="scanner-btn" onclick="document.getElementById('file-input').click()">
        📸 ESCANEAR COM GEMINI AI
        <input type="file" id="file-input" accept="image/*" hidden onchange="analisarComAI(this)">
    </div>
    
    <div id="status"></div>

    <h4>HISTÓRICO DE INVESTIMENTOS</h4>
    <div id="historico"></div>

<script>
    // Carregar chave salva
    document.getElementById('api-key').value = localStorage.getItem('gemini_key') || '';

    async function analisarComAI(input) {
        const key = document.getElementById('api-key').value;
        if(!key) return alert("Por favor, cole sua API Key primeiro!");
        localStorage.setItem('gemini_key', key);

        const file = input.files[0];
        const reader = new FileReader();
        
        document.getElementById('status').innerText = "🤖 Gemini analisando imagem...";

        reader.onload = async () => {
            const base64Image = reader.result.split(',')[1];
            
            // Prompt para a IA extrair apenas o que importa
            const prompt = "Analise este print de investimento. Extraia o VALOR INVESTIDO e o LUCRO. Responda APENAS no formato JSON: {\"investido\": 0.00, \"lucro\": 0.00}";

            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: prompt },
                            { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                        ]}]
                    })
                });

                const data = await resp.json();
                const textoResposta = data.candidates[0].content.parts[0].text;
                const valores = JSON.parse(textoResposta.replace(/```json|```/g, ''));
                
                salvarNoHistorico(valores.investido, valores.lucro);
                document.getElementById('status').innerText = "✅ Concluído!";
            } catch (e) {
                alert("Erro ao processar imagem. Verifique sua chave.");
                document.getElementById('status').innerText = "";
            }
        };
        reader.readAsDataURL(file);
    }

    function salvarNoHistorico(inv, luc) {
        const hist = JSON.parse(localStorage.getItem('invest_hist') || '[]');
        const novo = { 
            data: new Date().toLocaleDateString('pt-BR'), 
            investido: inv, 
            lucro: luc 
        };
        hist.unshift(novo);
        localStorage.setItem('invest_hist', JSON.stringify(hist));
        render();
    }

    function render() {
        const hist = JSON.parse(localStorage.getItem('invest_hist') || '[]');
        document.getElementById('historico').innerHTML = hist.map(item => `
            <div class="hist-item">
                <small>${item.data}</small><br>
                <b>Investido:</b> R$ ${item.investido.toFixed(2)} | 
                <b style="color:var(--neon)">Lucro:</b> R$ ${item.lucro.toFixed(2)}
            </div>
        `).join('');
    }

    render();
</script>
</body>
</html>
