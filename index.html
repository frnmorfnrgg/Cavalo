<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO ™$</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; --purple: #a55eea; --red: #ff3e3e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 120px; overflow-x: hidden; }
        #auth-screen { position: fixed; inset: 0; background: #000; z-index: 10001; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #111; padding: 30px; border-radius: 30px; width: 90%; max-width: 380px; text-align: center; border: 1px solid #222; }
        .auth-card input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; }
        .btn-auth { width: 100%; padding: 18px; border-radius: 12px; border: none; background: var(--neon); color: #000; font-weight: bold; cursor: pointer; }
        #app-content { display: none; }
        .container { padding: 25px; max-width: 800px; margin: auto; }
        .page { display: none; animation: fadeIn 0.3s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        .label { color: #aaa; font-size: 0.7rem; text-transform: uppercase; margin-bottom: 8px; display: block; font-weight: bold; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .border-total { border-left: 6px solid var(--neon); }
        .border-video { border-left: 6px solid var(--red); }
        .border-invest { border-left: 6px solid var(--blue); }
        .scanner-area { background: rgba(0, 212, 255, 0.08); border: 2px dashed var(--blue); padding: 20px; border-radius: 20px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        #loading-ai { display: none; color: var(--blue); font-size: 0.8rem; margin-top: 10px; font-weight: bold; }
        .input-box { background: #1a1a1a; padding: 12px; border-radius: 15px; border: 1px solid #333; margin-bottom: 10px; }
        .input-box label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 4px; }
        .input-box input { width: 100%; background: transparent; border: none; color: white; font-size: 1.1rem; outline: none; }
        .input-box input[type="date"] { color-scheme: dark; }
        .btn-save { width: 100%; background: var(--neon); color: #000; border: none; padding: 18px; border-radius: 15px; font-weight: 800; cursor: pointer; }
        .btn-reset { width: 100%; background: transparent; color: var(--red); border: 1px solid var(--red); padding: 10px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; font-size: 0.8rem; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 85px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; border-top: 1px solid #222; z-index: 1000; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 0.65rem; font-weight: bold; }
        .nav-item.active { color: var(--neon); }
        .hist-item { background:#1a1a1a; padding:15px; border-radius:15px; margin-bottom:12px; border: 1px solid #333; position: relative; }
        .btn-del { position: absolute; top: 10px; right: 10px; color: var(--red); background: none; border: none; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .data-info { font-size: 0.75rem; margin-bottom: 4px; display: flex; justify-content: space-between; padding-right: 25px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="color: var(--neon); margin-bottom: 20px;">Finance PRO</h1>
        <input type="text" id="auth-user" placeholder="ID de Usuário">
        <input type="password" id="auth-pass" placeholder="Senha">
        <button class="btn-auth" onclick="handleAuth()">ENTRAR</button>
    </div>
</div>

<div id="app-content">
    <div class="container">
        <h2 style="text-align: center; font-size: 0.8rem; color: #888;">CONTA: <span id="user-display" style="color: var(--neon);"></span></h2>

        <div id="page-geral" class="page active">
            <div class="card border-total">
                <span class="label" style="color: var(--neon);">Saldo de Lucros Acumulado</span>
                <div style="font-size: 2.2rem; font-weight: 800;">R$ <span id="display-cofre">0,00</span></div>
                <button class="btn-reset" onclick="zerarSaldo()">LIMPAR DADOS</button>
            </div>
            <div class="row">
                <div class="card border-video">
                    <span class="label" style="color: var(--red);">Ganhos Vídeos</span>
                    <div style="font-size: 1.1rem;">R$ <span id="display-video-resumo">0,00</span></div>
                </div>
                <div class="card border-invest">
                    <span class="label" style="color: var(--blue);">Capital em Operação</span>
                    <div style="font-size: 1.1rem;">R$ <span id="display-invest-resumo">0,00</span></div>
                </div>
            </div>
            <button onclick="logout()" style="background:#222; color:#fff; border:none; padding:15px; border-radius:12px; width:100%; font-weight: bold; margin-top: 10px;">SAIR / TROCAR CONTA</button>
        </div>

        <div id="page-invest" class="page">
            <div class="scanner-area" onclick="document.getElementById('ai-scanner').click()">
                <span style="font-size: 2.2rem;">📸</span><br>
                <span style="font-weight: 900; color: var(--blue);">ESCANEAR REGISTRO</span><br>
                <input type="file" id="ai-scanner" accept="image/*" hidden onchange="scanImage(this)">
                <div id="loading-ai">🤖 ANALISANDO IMAGEM...</div>
            </div>

            <div class="card border-invest">
                <span class="label">Entrada Manual</span>
                <div class="input-box"><label>DATA DO INVESTIMENTO</label><input type="date" id="v-data"></div>
                <div class="input-box"><label>VALOR INVESTIDO (R$)</label><input type="number" id="v-p"></div>
                <div class="input-box"><label>LUCRO A RECEBER (R$)</label><input type="number" id="v-l"></div>
                <div class="input-box"><label>PRAZO (DIAS)</label><input type="number" id="v-n" value="1"></div>
                <button class="btn-save" style="background: var(--blue); color: white;" onclick="saveToCofre('invest')">SALVAR REGISTRO</button>
                <div id="history-items" style="margin-top: 20px;"></div>
            </div>
        </div>

        <div id="page-videos" class="page">
            <div class="card border-video">
                <span class="label">Ganhos Vídeos</span>
                <div class="input-box"><label>QUANTIDADE</label><input type="number" id="vid-qtd"></div>
                <div class="input-box"><label>VALOR UNITÁRIO</label><input type="number" id="vid-val" step="0.01"></div>
                <button class="btn-save" style="background: var(--red); color: white;" onclick="saveToCofre('video')">ADICIONAR</button>
            </div>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('geral', this)">🏠<br>Início</div>
        <div class="nav-item" onclick="tab('invest', this)">📊<br>Investir</div>
        <div class="nav-item" onclick="tab('videos', this)">🎬<br>Vídeos</div>
    </nav>
</div>

<script>
    let currentUser = "";
    let cofreGeral = 0, ganhoVideos = 0, capitalInvestidoTotal = 0, historicoInvest = [];

    function setHoje() {
        const d = new Date();
        const hoje = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
        document.getElementById('v-data').value = hoje;
    }

    async function scanImage(input) {
        if (!input.files || !input.files[0]) return;
        document.getElementById('loading-ai').style.display = 'block';
        try {
            const result = await Tesseract.recognize(input.files[0], 'por');
            const fullText = result.data.text;
            const lines = fullText.split('\n');
            let tempInvest = 0, tempRendimento = 0, tempDias = 0;
            let detectedDate = new Date();

            const dateMatch = fullText.match(/(\d{2})\/(\d{2})(\/(\d{2,4}))?/);
            if (dateMatch) {
                const dia = parseInt(dateMatch[1]);
                const mes = parseInt(dateMatch[2]) - 1;
                const ano = dateMatch[4] ? (dateMatch[4].length === 2 ? 2000 + parseInt(dateMatch[4]) : parseInt(dateMatch[4])) : new Date().getFullYear();
                detectedDate = new Date(ano, mes, dia, 12, 0, 0); // Meio-dia para evitar erro de fuso
            }

            lines.forEach(line => {
                const dMatch = line.match(/(\d+)\s*dias/i);
                if(dMatch) tempDias = parseInt(dMatch[1]);
                if(line.includes("BRL")) {
                    const vMatch = line.match(/BRL\s*([\d.,]+)/i);
                    let valor = vMatch ? parseFloat(vMatch[1].replace(',', '.')) : 0;
                    if(tempInvest === 0) tempInvest = valor;
                    else tempRendimento = valor;
                }
                if(tempInvest > 0 && tempRendimento > 0) {
                    adicionarRegistro(tempInvest, tempRendimento, tempDias, detectedDate);
                    tempInvest = 0; tempRendimento = 0;
                }
            });
            update(); renderHistorico();
        } catch (e) { alert("Erro na análise"); }
        finally { document.getElementById('loading-ai').style.display = 'none'; }
    }

    function adicionarRegistro(invest, lucro, dias, dataInput) {
        let dInic;
        // Se vier do input (string), trata de forma que não mude o dia
        if (typeof dataInput === 'string') {
            const partes = dataInput.split('-');
            dInic = new Date(partes[0], partes[1] - 1, partes[2], 12, 0, 0);
        } else {
            dInic = new Date(dataInput);
            dInic.setHours(12, 0, 0, 0);
        }

        let dFim = new Date(dInic);
        dFim.setDate(dInic.getDate() + (parseInt(dias) || 1));
        
        historicoInvest.unshift({ 
            id: Date.now() + Math.random(),
            investido: invest, 
            lucro: lucro, 
            total: (invest + lucro), 
            dataFeito: formatarSimples(dInic),
            dataSairCompleta: formatarComSemana(dFim)
        });
        capitalInvestidoTotal += invest; 
        cofreGeral += lucro;
    }

    function removeInvest(id) {
        const idx = historicoInvest.findIndex(i => i.id === id);
        if(idx > -1) {
            cofreGeral -= historicoInvest[idx].lucro;
            capitalInvestidoTotal -= historicoInvest[idx].investido;
            historicoInvest.splice(idx, 1);
            update(); renderHistorico();
        }
    }

    function saveToCofre(tipo) {
        if(tipo === 'video') {
            const v = (parseFloat(document.getElementById('vid-qtd').value) || 0) * (parseFloat(document.getElementById('vid-val').value) || 0);
            cofreGeral += v; ganhoVideos += v;
        } else {
            const p = parseFloat(document.getElementById('v-p').value) || 0;
            const l = parseFloat(document.getElementById('v-l').value) || 0;
            const n = parseInt(document.getElementById('v-n').value) || 1;
            const dataEscolha = document.getElementById('v-data').value;
            if(p > 0) adicionarRegistro(p, l, n, dataEscolha);
            document.getElementById('v-p').value = ""; document.getElementById('v-l').value = "";
            setHoje();
        }
        update(); renderHistorico();
    }

    function formatarSimples(data) { 
        return data.getDate().toString().padStart(2,'0')+'/'+(data.getMonth()+1).toString().padStart(2,'0'); 
    }

    function formatarComSemana(data) {
        const diasSemana = ["Domingo", "Segunda-feira", "Terça-feira", "Quarta-feira", "Quinta-feira", "Sexta-feira", "Sábado"];
        return `${diasSemana[data.getDay()]}, ${formatarSimples(data)}`;
    }

    function update() {
        const f = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
        document.getElementById('display-cofre').innerText = f(cofreGeral);
        document.getElementById('display-video-resumo').innerText = f(ganhoVideos);
        document.getElementById('display-invest-resumo').innerText = f(capitalInvestidoTotal);
        if(currentUser) localStorage.setItem(currentUser + '_all_data', JSON.stringify({cofreGeral, ganhoVideos, capitalInvestidoTotal, historicoInvest}));
    }

    function renderHistorico() {
        document.getElementById('history-items').innerHTML = historicoInvest.map(item => `
            <div class="hist-item">
                <button class="btn-del" onclick="removeInvest(${item.id})">×</button>
                <div class="data-info">
                    <span style="color:var(--blue)">Investido: ${item.dataFeito}</span>
                    <span style="color:var(--neon)">Libera: ${item.dataSairCompleta}</span>
                </div>
                <div style="display:flex; justify-content:space-between; margin-top:8px">
                    <span style="font-size:0.7rem; color:#888">Inv: R$ ${item.investido.toFixed(2)}</span>
                    <span style="color:var(--neon); font-weight:bold">Lucro: +R$ ${item.lucro.toFixed(2)}</span>
                </div>
                <div style="font-size:0.65rem; color:var(--blue); text-align:right; border-top:1px solid #222; margin-top:5px; padding-top:5px">
                    Total a receber: <b>R$ ${item.total.toFixed(2)}</b>
                </div>
            </div>`).join('');
    }

    function handleAuth() {
        currentUser = document.getElementById('auth-user').value.trim().toLowerCase() || "user";
        localStorage.setItem('finance_session', currentUser);
        const saved = JSON.parse(localStorage.getItem(currentUser + '_all_data')) || {};
        cofreGeral = saved.cofreGeral || 0; ganhoVideos = saved.ganhoVideos || 0; capitalInvestidoTotal = saved.capitalInvestidoTotal || 0;
        historicoInvest = saved.historicoInvest || [];
        document.getElementById('user-display').innerText = currentUser.toUpperCase();
        document.getElementById('auth-screen').style.display = 'none'; document.getElementById('app-content').style.display = 'block';
        setHoje(); update(); renderHistorico();
    }

    function zerarSaldo() { if(confirm("Zerar?")) { localStorage.clear(); location.reload(); } }
    function logout() { localStorage.removeItem('finance_session'); location.reload(); }
    function tab(id, el) { document.querySelectorAll('.page, .nav-item').forEach(x => x.classList.remove('active')); document.getElementById('page-'+id).classList.add('active'); el.classList.add('active'); }
    window.onload = () => { if(localStorage.getItem('finance_session')) { document.getElementById('auth-user').value = localStorage.getItem('finance_session'); handleAuth(); } }
</script>
</body>
</html>
