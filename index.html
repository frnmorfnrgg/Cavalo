<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Finance PRO - Scanner Especial</title>
    <script src="https://unpkg.com/tesseract.js@v4.0.1/dist/tesseract.min.js"></script>
    <style>
        :root { --neon: #00ff88; --bg: #050505; --card: #121212; --blue: #00d4ff; --red: #ff3e3e; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: white; margin: 0; padding-bottom: 100px; }
        
        .header { background: linear-gradient(to bottom, #87ceeb, #5f9ea0); padding: 15px; text-align: center; font-weight: bold; color: #003366; }
        .container { padding: 20px; }

        /* Área de Scanner Estilizada */
        .scanner-card { 
            background: rgba(0, 212, 255, 0.1); 
            border: 2px dashed var(--blue); 
            padding: 30px; border-radius: 20px; 
            text-align: center; margin-bottom: 20px; cursor: pointer;
        }

        /* Histórico igual ao print */
        .hist-item { 
            background: var(--card); border-radius: 15px; 
            padding: 15px; margin-bottom: 10px; 
            border-left: 5px solid var(--blue);
            position: relative;
        }
        .val-inv { color: var(--blue); font-size: 1.2rem; font-weight: bold; }
        .val-retorno { color: var(--red); font-weight: bold; text-align: right; }
        
        #loading { display: none; color: var(--blue); font-weight: bold; margin: 10px 0; }
        .btn-del { position: absolute; top: 10px; right: 10px; color: #444; border: none; background: none; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="header">Registro de Operações</div>

<div class="container">
    <div class="scanner-card" onclick="document.getElementById('img-input').click()">
        <span style="font-size: 2rem;">📸</span><br>
        <b>ESCANEAR EXTRATO</b>
        <input type="file" id="img-input" accept="image/*" hidden onchange="lerPrint(this)">
        <div id="loading">🤖 ANALISANDO VALORES...</div>
    </div>

    <h3 style="font-size: 0.9rem; color: #888;">HISTÓRICO RECENTE</h3>
    <div id="lista-invest"></div>
</div>

<script>
    async function lerPrint(input) {
        if (!input.files || !input.files[0]) return;
        const loader = document.getElementById('loading');
        loader.style.display = 'block';

        try {
            const worker = await Tesseract.createWorker();
            await worker.loadLanguage('eng'); // 'eng' funciona melhor para números e siglas como BRL
            await worker.initialize('eng');
            
            const { data: { text } } = await worker.recognize(input.files[0]);
            console.log("Texto detectado:", text); // Para debug

            // Procura por padrões como "BRL 130.00" ou "BRL 55.00"
            const regex = /BRL\s?(\d+[\.,]\d{2})/gi;
            let matches = [...text.matchAll(regex)];
            
            if (matches.length >= 2) {
                // No seu print, o primeiro BRL é o Investimento e o segundo (embaixo) é o Retorno
                let inv = parseFloat(matches[0][1].replace(',', '.'));
                let ret = parseFloat(matches[1][1].replace(',', '.'));
                
                // Se o lucro for maior que o investimento (como no seu print de 130 para 442)
                let lucroReal = ret - inv;
                if (lucroReal < 0) lucroReal = ret; // Caso a IA troque as ordens

                adicionarAoHistórico(inv, lucroReal);
            } else {
                alert("Não consegui ler os valores BRL. Tente uma foto mais nítida.");
            }
            await worker.terminate();
        } catch (e) {
            alert("Erro ao processar imagem.");
        } finally {
            loader.style.display = 'none';
        }
    }

    function adicionarAoHistórico(investido, lucro) {
        const dados = JSON.parse(localStorage.getItem('fin_pro_data') || '[]');
        dados.unshift({
            id: Date.now(),
            inv: investido,
            luc: lucro,
            data: new Date().toLocaleDateString('pt-BR')
        });
        localStorage.setItem('fin_pro_data', JSON.stringify(dados));
        desenhar();
    }

    function remover(id) {
        let dados = JSON.parse(localStorage.getItem('fin_pro_data') || '[]');
        dados = dados.filter(d => d.id !== id);
        localStorage.setItem('fin_pro_data', JSON.stringify(dados));
        desenhar();
    }

    function desenhar() {
        const dados = JSON.parse(localStorage.getItem('fin_pro_data') || '[]');
        document.getElementById('lista-invest').innerHTML = dados.map(item => `
            <div class="hist-item">
                <button class="btn-del" onclick="remover(${item.id})">×</button>
                <div style="font-size: 0.7rem; color: #888;">${item.data}</div>
                <div class="val-inv">BRL ${item.inv.toFixed(2)}</div>
                <div class="val-retorno">Retorno: BRL ${(item.inv + item.luc).toFixed(2)}</div>
                <div style="color: var(--neon); font-size: 0.8rem; text-align: right;">Lucro: + BRL ${item.luc.toFixed(2)}</div>
            </div>
        `).join('');
    }

    window.onload = desenhar;
</script>
</body>
</html>
